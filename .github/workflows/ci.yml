name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') && !contains(github.event.pull_request.title || '', '[skip ci]') }}

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Generate coverage report (Node.js 22 only)
        if: matrix.node-version == '22.x'
        run: npm run test:coverage

      - name: Build project
        run: npm run build

      - name: Upload coverage to Codecov (Node.js 22 only)
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v5
        with:
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') && !contains(github.event.pull_request.title || '', '[skip ci]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check if package can be published
        run: npm run prepublishOnly
